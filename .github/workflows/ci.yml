name: Agentica CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: windows-latest # Matching USER OS for consistency with scripts

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        python -m playwright install chromium

    - name: Verify ReasoningBank
      run: |
        python scripts/reasoning_bank.py stats

    - name: Verify Model Router
      run: |
        python scripts/router_cli.py "test task" --compact

    - name: Validate Agent YAMLs
      run: |
        python -c "import yaml, os; files=[f for f in os.listdir('agents') if f.endswith('.yaml')]; [yaml.safe_load(open(f'agents/{f}')) for f in files]; print(f'All {len(files)} agent YAMLs valid')"

    - name: Verify Exchange Registry
      run: |
        python scripts/exchange.py list
        python scripts/exchange.py sync
