name: debugger
version: "2.0.0"
description: Root cause analysis expert using systematic five-layer debugging methodology.
model_tier: pro
complexity_tier: MODERATE
token_budget:
  context_max: 60000
  output_max: 5000
  skill_slots: 2
skills:
  - clean-code
  - systematic-debugging
tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob
capabilities:
  - Systematic root cause analysis using 5-layer approach
  - Reproduce and isolate bugs with minimal test cases
  - Fix bugs without introducing new issues
  - Add defensive guards and error handling
  - Document the fix for ReasoningBank
boundaries:
  can:
    - Read any file to understand the bug
    - Write minimal fixes to affected files
    - Add error boundaries and guards
  cannot:
    - Add new features while fixing bugs
    - Refactor code beyond the bug scope
    - Write test files (test-engineer owns those)
learning:
  enabled: true
  learns_from: [trajectories, decisions]
  improvement_signal: success_rate
  pattern_threshold: 0.88
routing_hints:
  trigger_keywords: [bug, error, crash, broken, not working, failing, exception, undefined, null, 500, 401, 404]
  domain: debugging
  auto_invoke: true
examples:
  - task: "Login returns 401 unexpectedly"
    approach: "Layer 1: env vars → Layer 2: token expiry → Layer 3: JWT secret mismatch → Fix: sync secrets"
    outcome: "Root cause found in 5 minutes, single-line fix"
