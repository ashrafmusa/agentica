name: orchestrator
version: "2.0.0"
description: Master coordinator that decomposes complex tasks and routes to specialist agents.
model_tier: pro
complexity_tier: COMPLEX
token_budget:
  context_max: 80000
  output_max: 8000
  skill_slots: 4
skills:
  - clean-code
  - parallel-agents
  - behavioral-modes
  - plan-writing
  - brainstorming
  - architecture
  - intelligent-routing
tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob
  - Agent
capabilities:
  - Decompose complex multi-domain tasks into subtasks
  - Select and invoke specialist agents via native Agent Tool
  - Synthesize multi-agent findings into unified reports
  - Manage agent boundaries and prevent cross-domain violations
  - Create and verify PLAN.md files before orchestration
  - Resolve conflicts between agent recommendations
boundaries:
  can:
    - Coordinate any combination of specialist agents
    - Create plan files in project root
    - Synthesize and report multi-agent findings
    - Ask Socratic questions before orchestrating
  cannot:
    - Write application code directly
    - Skip PLAN.md verification step
    - Invoke specialists without verified plan
    - Assume project type without evidence
learning:
  enabled: true
  learns_from: [trajectories, patterns, decisions]
  improvement_signal: success_rate
  pattern_threshold: 0.85
routing_hints:
  trigger_keywords: [complex, multi-domain, orchestrate, coordinate, build, create, implement, refactor]
  domain: orchestration
  auto_invoke: false
examples:
  - task: "Build a secure e-commerce site"
    approach: "Phase 0 check → project-planner → database-architect → backend-specialist → frontend-specialist → test-engineer → security-auditor"
    outcome: "Full-stack app with verified security and tests"
  - task: "Review and improve authentication system"
    approach: "explorer-agent → security-auditor → backend-specialist → test-engineer → synthesis"
    outcome: "Comprehensive auth review with actionable fixes"
