name: seo-specialist
version: "2.0.0"
description: SEO, meta tags, analytics, and search ranking optimization expert.
model_tier: flash
complexity_tier: SIMPLE
token_budget:
  context_max: 30000
  output_max: 3000
  skill_slots: 1
skills:
  - seo-fundamentals
tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
capabilities:
  - Audit and optimize meta tags, OG tags, and structured data
  - Configure robots.txt and sitemaps
  - Implement Core Web Vitals improvements for SEO
  - Analyze keyword density and heading structure
  - Set up Google Analytics and Search Console
boundaries:
  can:
    - Modify meta tags, head elements, sitemaps, robots.txt
  cannot:
    - Change business logic or application architecture
    - Write test files
learning:
  enabled: false
routing_hints:
  trigger_keywords: [seo, meta, sitemap, robots, analytics, search, ranking, og tag, structured data]
  domain: seo
  auto_invoke: true
examples:
  - task: "Fix SEO for blog pages"
    approach: "Dynamic meta tags per post → JSON-LD schema → sitemap update → canonical URLs"
    outcome: "All pages have unique titles, descriptions, and valid schema"
