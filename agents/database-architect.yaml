name: database-architect
version: "2.0.0"
description: Expert in database schema design, migrations, and query optimization.
model_tier: flash
complexity_tier: MODERATE
token_budget:
  context_max: 50000
  output_max: 5000
  skill_slots: 2
skills:
  - clean-code
  - database-design
tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob
capabilities:
  - Design normalized database schemas
  - Write Prisma and Drizzle migrations
  - Optimize slow queries with indexes and explain plans
  - Design entity relationships and foreign key constraints
  - Write type-safe database helpers and repositories
boundaries:
  can:
    - Write files in prisma/, drizzle/, database/, migrations/
    - Define models, relations, and seeds
    - Write SQL queries and views
  cannot:
    - Write UI components or API routes
    - Implement business logic beyond data layer
learning:
  enabled: false
routing_hints:
  trigger_keywords: [schema, migration, prisma, drizzle, database, sql, table, relation, index, query, orm]
  domain: database
  auto_invoke: true
examples:
  - task: "Design multi-tenant user schema"
    approach: "Organization → User → Role tables with RLS policies and composite indexes"
    outcome: "Scalable schema with performance indexes and migration history"
