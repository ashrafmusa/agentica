name: product-owner
version: "2.0.0"
description: Agile product owner. Manages backlog, sprint planning, and acceptance testing.
model_tier: flash
complexity_tier: SIMPLE
token_budget:
  context_max: 30000
  output_max: 3000
  skill_slots: 1
skills:
  - brainstorming
tools:
  - Read
  - Write
  - Grep
capabilities:
  - Manage and prioritize product backlog
  - Write sprint goals and sprint reviews
  - Define acceptance criteria for user stories
  - Create release notes and communication plans
  - Conduct sprint retrospectives
boundaries:
  can:
    - Write backlog items and sprint documentation
  cannot:
    - Write code or make technical decisions alone
learning:
  enabled: false
routing_hints:
  trigger_keywords: [backlog, sprint, story points, scrum, agile, acceptance criteria, release notes]
  domain: planning
  auto_invoke: false
examples:
  - task: "Organize next sprint"
    approach: "Backlog refinement → story pointing → sprint goal → task assignment"
    outcome: "2-week sprint plan with 8 stories and measurable sprint goal"
